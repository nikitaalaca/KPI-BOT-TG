<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0B0C10" />
  <title>CASH КАЛЬКУЛЯТОР</title>

  <style>
    /* --- iOS SF Pro Font System --- */
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

    :root {
      /* Deep Charcoal Palette */
      --bg-primary: #0B0C10;
      --bg-secondary: #13151A;
      --bg-tertiary: #1A1D24;
      
      /* Glassmorphism */
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      
      /* Neon Blue Accents */
      --accent-primary: #4C7DFF;
      --accent-gradient: linear-gradient(135deg, #4C7DFF 0%, #6A8DFF 100%);
      --accent-glow: rgba(76, 125, 255, 0.3);
      
      /* Text */
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-tertiary: rgba(255, 255, 255, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 16px 40px;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* --- Header --- */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      margin-bottom: 4px;
    }
    .app-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .app-title span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      color: var(--text-tertiary);
      backdrop-filter: blur(10px);
    }

    /* --- Card System (Glassy & Rounded) --- */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title svg {
      width: 18px; height: 18px;
      fill: var(--accent-primary);
    }

    /* --- Inputs --- */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .input-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-left: 4px;
    }
    select, input[type="number"] {
      width: 100%;
      height: 54px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 0 16px;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* --- Glowing Sliders --- */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      outline: none;
      transition: opacity 0.2s;
      margin: 12px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      box-shadow: 0 0 15px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.4);
      border: 2px solid var(--accent-primary);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
    
    /* Progress fill effect for sliders */
    .slider-wrapper {
      position: relative;
      width: 100%;
    }
    .slider-value {
      font-size: 22px;
      font-weight: 700;
      text-align: right;
      margin-top: -6px;
    }

    /* --- Controls Grid (Salaries) --- */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* --- KPI Modern Segmented Card --- */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .kpi-item {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .kpi-title-sm {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
    .kpi-input-group {
      display: flex;
      gap: 8px;
    }
    .kpi-input-group input {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      padding: 0 4px;
    }

    /* --- Premium Calculate Button --- */
    .btn-calc {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 20px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background: var(--accent-gradient);
      box-shadow: 0 10px 30px -5px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }
    .btn-calc:active {
      transform: scale(0.96);
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    /* --- Results --- */
    .result-card {
      background: rgba(76, 125, 255, 0.05);
      border: 1px solid rgba(76, 125, 255, 0.15);
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .result-row:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .res-label { font-size: 15px; color: var(--text-secondary); }
    .res-val { font-size: 16px; font-weight: 600; }
    
    .total-row {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 2px solid var(--accent-primary) !important;
    }
    .total-row .res-label, .total-row .res-val {
      font-size: 22px;
      font-weight: 800;
      color: white;
    }

    @media(max-width: 480px) {
      .controls-grid, .kpi-grid { grid-template-columns: 1fr; }
      .kpi-grid { gap: 16px; }
    }
  </style>
</head>

<body>

<div class="app-container">
  
  <div class="app-header">
    <h1 class="app-title">ЗПШКА<span>.</span></h1>
    <span class="header-badge">EGORKIN DEV</span>
  </div>

  <!-- Hours & Format -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        Рабочее время
      </div>
    </div>
    <div class="input-group">
      <span class="input-label">Формат & Должность</span>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <select id="format">
          <option value="BR">BR</option>
          <option value="MAU">MAU</option>
        </select>
        <select id="position">
          <option value="JSE">JSE</option>
          <option value="SE">SE, SSE</option>
        </select>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="input-group">
        <span class="input-label">Часы (с обедом)</span>
        <input id="hoursWith" type="number" value="160" />
      </div>
      <div class="input-group">
        <span class="input-label">Часы (без обеда)</span>
        <input id="hoursWithout" type="number" value="150" />
      </div>
    </div>
    <div class="input-group">
      <span class="input-label">Дополнительные (обучение, брифы)</span>
      <input id="hoursBuffer" type="number" value="0" />
    </div>
  </div>

  <!-- Rate & Premium -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
        Ставки
      </div>
    </div>
    <div class="controls-grid">
      <div class="input-group">
        <span class="input-label">Ставка / час</span>
        <div class="slider-wrapper">
          <input type="range" id="rateSlider" min="100" max="500" value="250" />
          <div class="slider-value" id="rateValue">250 ₽</div>
        </div>
      </div>
      <div class="input-group">
        <span class="input-label">Премия</span>
        <div class="slider-wrapper">
          <input type="range" id="premiumSlider" min="100" max="500" value="250" />
          <div class="slider-value" id="premiumValue">250 ₽</div>
        </div>
      </div>
    </div>
  </div>

  <!-- KPI Section -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        Показатели KPI
      </div>
      <span id="kpiHint" style="font-size: 12px; color: var(--text-tertiary);">Вес: 100%</span>
    </div>
    <div class="kpi-grid" id="kpiContainer">
      <!-- Generated via JS to reduce HTML clutter -->
    </div>
  </div>

  <!-- Action -->
  <button class="btn-calc" onclick="calculate()">Рассчитать доход</button>

  <!-- Results -->
  <div class="card result-card">
    <div class="result-row">
      <span class="res-label">Ставка / час</span>
      <span id="rate" class="res-val">—</span>
    </div>
    <div class="result-row">
      <span class="res-label">Оклад</span>
      <span id="oklad" class="res-val">—</span>
    </div>
    <div class="result-row">
      <span class="res-label">Бонус</span>
      <span id="bonus" class="res-val">—</span>
    </div>
    <div class="result-row total-row">
      <span class="res-label">Итого к выплате</span>
      <span id="total" class="res-val">—</span>
    </div>
  </div>
  
</div>

<script>
  (function() {
    // --- Render KPI Cards programmatically for cleaner layout ---
    const kpiContainer = document.getElementById('kpiContainer');
    kpiContainer.innerHTML = '';
    for(let i=1; i<=4; i++) {
      const item = document.createElement('div');
      item.className = 'kpi-item';
      item.innerHTML = `
        <div class="kpi-title-sm">
          <span>KPI ${i}</span>
          <span id="coeff_${i}" style="color:var(--accent-primary)">x1.0</span>
        </div>
        <div class="kpi-input-group">
          <input id="w${i}" type="number" placeholder="Вес" value="${i<=2 ? 50 : ''}" />
          <input id="v${i}" type="number" placeholder="%" value="${i<=2 ? 100 : ''}" />
        </div>
      `;
      kpiContainer.appendChild(item);
    }

    // --- DOM Elements ---
    const rateSlider = document.getElementById('rateSlider');
    const premiumSlider = document.getElementById('premiumSlider');
    const rateValue = document.getElementById('rateValue');
    const premiumValue = document.getElementById('premiumValue');
    const positionSelect = document.getElementById('position');
    const hoursWith = document.getElementById('hoursWith');
    const hoursWithout = document.getElementById('hoursWithout');
    const hoursBuffer = document.getElementById('hoursBuffer');
    const kpiHint = document.getElementById('kpiHint');
    
    const rateDisplay = document.getElementById('rate');
    const okladDisplay = document.getElementById('oklad');
    const bonusDisplay = document.getElementById('bonus');
    const totalDisplay = document.getElementById('total');

    const fmtMoney = (n) => Number(n).toFixed(0) + ' ₽';

    // --- Logic from Matrix ---
    const getKpiCoefficient = (raw, position) => {
      const v = parseFloat(raw);
      if (isNaN(v)) return 1;
      if (v < 80) return 0;
      if (v >= 80 && v < 90) return position === 'JSE' ? 0.8 : 0.6;
      if (v >= 90 && v < 100) return position === 'JSE' ? 0.9 : 0.8;
      if (v === 100) return 1;
      if (v > 100) return Math.min(1 + ((v - 100) * 0.025), 1.25);
      return 1;
    };

    const calculate = () => {
      let totalWeight = 0;
      let isValid = true;
      
      // Validation & Coefficient updates
      for(let i=1; i<=4; i++) {
        const w = parseFloat(document.getElementById(`w${i}`).value) || 0;
        const v = parseFloat(document.getElementById(`v${i}`).value) || 0;
        const coeffEl = document.getElementById(`coeff_${i}`);
        
        if(w > 0 && v > 0) {
          totalWeight += w;
          const coeff = getKpiCoefficient(v, positionSelect.value);
          coeffEl.textContent = `x${coeff.toFixed(3)}`;
        } else {
          coeffEl.textContent = `x0.0`;
        }
      }

      if(totalWeight > 0 && Math.abs(totalWeight - 100) > 0.1) {
        kpiHint.style.color = '#FF453A'; 
        kpiHint.textContent = `Ошибка: сумма весов ${totalWeight}%`;
        isValid = false;
      } else {
        kpiHint.style.color = 'var(--text-tertiary)';
        kpiHint.textContent = totalWeight === 0 ? 'Вес: 0%' : 'Вес: 100% ✓';
      }

      // Financials
      const rate = parseFloat(rateSlider.value) || 0;
      const premium = parseFloat(premiumSlider.value) || 0;
      const hw = parseFloat(hoursWith.value) || 0;
      const hwo = parseFloat(hoursWithout.value) || 0;
      const buffer = parseFloat(hoursBuffer.value) || 0;

      const finalRate = document.getElementById('format').value === 'MAU' ? rate * 1.10 : rate;
      const oklad = finalRate * (hw + buffer);
      const baseBonus = premium * hwo;

      let bonus = 0;
      if(isValid) {
        for(let i=1; i<=4; i++) {
          const w = parseFloat(document.getElementById(`w${i}`).value) || 0;
          const v = parseFloat(document.getElementById(`v${i}`).value) || 0;
          if(w > 0 && v > 0) {
            const normalizedWeight = w / totalWeight;
            bonus += baseBonus * normalizedWeight * getKpiCoefficient(v, positionSelect.value);
          }
        }
      }

      // Update UI
      rateDisplay.textContent = fmtMoney(finalRate);
      okladDisplay.textContent = fmtMoney(oklad);
      bonusDisplay.textContent = fmtMoney(bonus);
      totalDisplay.textContent = fmtMoney(oklad + bonus);
      
      // Update Slider Labels
      rateValue.textContent = rate + ' ₽';
      premiumValue.textContent = premium + ' ₽';
    };

    // Event Listeners
    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', calculate);
      el.addEventListener('change', calculate);
    });

    // Initial run
    calculate();
  })();
</script>
</body>
</html>
